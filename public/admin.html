<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | MindSpace Space</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-light: #f3f4f6;
      --card-bg: #ffffff;
      --text-dark: #111827;
      --text-muted: #6b7280;
      
      /* Apple-esque gradients */
      --grad-blue: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
      --grad-purple: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
      --grad-rose: linear-gradient(135deg, #fb7185 0%, #e11d48 100%);
      
      --shadow-soft: 0 10px 25px rgba(0,0,0,0.03), 0 4px 10px rgba(0,0,0,0.02);
      --shadow-hover: 0 20px 40px rgba(0,0,0,0.06), 0 10px 15px rgba(0,0,0,0.03);
    }

    body {
      background: var(--bg-light);
      color: var(--text-dark);
      margin: 0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Top Navigation bar */
    .top-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      box-sizing: border-box;
    }

    .brand {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-dark);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.5px;
    }

    .logout-btn {
      background: var(--bg-light);
      color: var(--text-muted);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.9rem;
    }

    .logout-btn:hover {
      background: #fee2e2;
      color: #e11d48;
    }

    /* Main Container layout */
    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      box-sizing: border-box;
      width: 100%;
    }

    .header-section {
      margin-bottom: 2.5rem;
    }

    .page-title {
      font-size: 2.2rem;
      font-weight: 800;
      margin: 0;
      color: var(--text-dark);
      letter-spacing: -1px;
    }

    .page-subtitle {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-size: 1.1rem;
    }

    /* Minimalist Cards */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .apple-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: var(--shadow-soft);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .apple-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .metric-icon {
      width: 45px;
      height: 45px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .metric-label {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .metric-value {
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1;
      letter-spacing: -1px;
    }

    /* Chart Layout */
    .dashboard-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 1024px) {
      .dashboard-layout {
        grid-template-columns: 1fr;
      }
    }

    .chart-panel {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: var(--shadow-soft);
      margin-bottom: 1.5rem;
    }

    .panel-header {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 1.5rem;
      letter-spacing: -0.3px;
    }

    .large-chart-wrapper {
      position: relative;
      height: 350px;
      width: 100%;
    }

    .small-chart-wrapper {
      position: relative;
      height: 250px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    /* Alerts */
    .alerts-container {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: var(--shadow-soft);
      height: 100%;
    }

    .alert-scroll {
      max-height: 500px;
      overflow-y: auto;
      padding-right: 10px;
    }

    .alert-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .alert-scroll::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 10px;
    }

    .alert-item {
      background: #fff1f2;
      border: 1px solid #ffe4e6;
      padding: 1.2rem;
      border-radius: 16px;
      margin-bottom: 1rem;
      transition: transform 0.2s ease;
    }

    .alert-item:hover {
      transform: scale(1.02);
    }

    .alert-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .alert-user {
      font-weight: 700;
      color: #be123c;
    }

    .alert-badge {
      background: #e11d48;
      color: white;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
    }

  </style>
</head>
<body>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <a href="index.html" class="brand">
      <img src="images/logo.png" alt="MindSpace" style="height: 32px; width: 32px; border-radius: 8px; vertical-align: middle;"> MindSpace Admin
    </a>
    <button id="btn-logout-admin" class="logout-btn">Log Out</button>
  </nav>

  <!-- Main Content -->
  <main class="main-content fade-in">
    <div class="main-container">
      
      <div class="header-section">
        <h1 class="page-title">Overview</h1>
        <div class="page-subtitle">Real-time metrics and community health analytics.</div>
      </div>

      <!-- Top Metrics -->
      <div class="metrics-grid">
        <div class="apple-card">
          <div class="metric-icon" style="background: var(--grad-blue); color: white;">👥</div>
          <div class="metric-label">Registered Users</div>
          <div id="stat-users" class="metric-value">--</div>
        </div>
        
        <div class="apple-card">
          <div class="metric-icon" style="background: var(--grad-purple); color: white;">📝</div>
          <div class="metric-label">Total Moods Logged</div>
          <div id="stat-moods" class="metric-value">--</div>
        </div>
        
        <div class="apple-card">
          <div class="metric-icon" style="background: var(--grad-rose); color: white;">❤️</div>
          <div class="metric-label">Avg Stress Level</div>
          <div id="stat-stress" class="metric-value">--</div>
        </div>
      </div>

      <!-- Massive Full-Width Chart -->
      <div class="chart-panel">
        <div class="panel-header">Volunteer Engagement (Last 14 Days)</div>
        <div class="large-chart-wrapper">
          <canvas id="barChart"></canvas>
        </div>
      </div>

      <!-- Bottom Layout -->
      <div class="dashboard-layout">
        
        <div style="display: flex; flex-direction: column;">
          
          <div class="chart-panel">
            <div class="panel-header">Average Stress Trajectory</div>
            <div class="small-chart-wrapper">
              <canvas id="lineChart"></canvas>
            </div>
          </div>

          <div class="chart-panel">
            <div class="panel-header">Stress Demographics</div>
            <div class="small-chart-wrapper">
              <canvas id="doughnutChart"></canvas>
            </div>
          </div>

        </div>

        <!-- Alerts -->
        <div class="alerts-container">
          <div class="panel-header" style="color: #e11d48;">🚨 Priority Alerts</div>
          <div class="alert-scroll" id="alerts-list">
            <p class="text-muted">Scanning for high stress...</p>
          </div>
        </div>

      </div>

    </div>
  </main>

  <script>
    const API_URL = 'http://localhost:3000/api';
    
    // Set global Chart.js themes for Clean Light Mode
    Chart.defaults.color = '#6b7280';
    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.borderColor = 'rgba(0,0,0,0.04)';

    document.addEventListener('DOMContentLoaded', async () => {
      // Secure Logout
      document.getElementById('btn-logout-admin').addEventListener('click', () => {
        localStorage.removeItem('admin_token');
        localStorage.removeItem('mindspace_user');
        window.location.href = 'index.html';
      });

      const adminToken = localStorage.getItem('admin_token');
      if (!adminToken) {
        window.location.href = 'admin-login.html';
        return;
      }

      try {
        const res = await fetch(`${API_URL}/admin/stats`, {
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        const data = await res.json();
        
        if (data.error) {
          alert('Not Admin Authorized.');
          window.location.href = 'admin-login.html';
          return;
        }

        // 1. Populate Metrics
        document.getElementById('stat-users').innerText = data.totalUsers || 0;
        document.getElementById('stat-moods').innerText = data.totalMoods || 0;
        document.getElementById('stat-stress').innerText = data.avgStress ? data.avgStress.toFixed(1) : 'N/A';
        
        // 2. Render High Stress Alerts
        const alertsList = document.getElementById('alerts-list');
        alertsList.innerHTML = '';
        
        if (data.recentAlerts && data.recentAlerts.length > 0) {
          data.recentAlerts.forEach(alert => {
            const dateStr = new Date(alert.date).toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            const item = document.createElement('div');
            item.className = 'alert-item';
            item.innerHTML = `
              <div class="alert-top">
                <span class="alert-user">${alert.userId?.anonymousId ? alert.userId.anonymousId.substring(0,8) + '...' : 'Unknown'}</span>
                <span class="alert-badge">Lv ${alert.stressLevel}</span>
              </div>
              <div style="font-size: 0.9rem; color: #4b5563; margin-bottom: 6px;">
                <strong>${alert.emoji}</strong> · <span style="color: #9ca3af;">${dateStr}</span>
              </div>
              ${alert.note ? `<div style="font-size: 0.9rem; color: #111827; background: #fff; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); font-style: italic;">"${alert.note}"</div>` : ''}
            `;
            alertsList.appendChild(item);
          });
        } else {
          alertsList.innerHTML = `
            <div style="text-align: center; padding: 3rem 0; color: #9ca3af;">
              <div style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;">✨</div>
              <div style="font-weight: 500;">No high stress alerts.</div>
            </div>`;
        }
        
        // Chart Dependencies
        const moodsTime = data.moodsOverTime || [];
        const timeLabels = moodsTime.map(item => item._id);
        const engageData = moodsTime.map(item => item.count);
        const stressLineData = moodsTime.map(item => item.avgStress ? item.avgStress.toFixed(2) : 0);
        
        // 3. Render Massive Engagement Bar Chart
        const barCtx = document.getElementById('barChart').getContext('2d');
        const barGradient = barCtx.createLinearGradient(0, 0, 0, 400);
        barGradient.addColorStop(0, '#38bdf8');
        barGradient.addColorStop(1, '#3b82f6');

        new Chart(barCtx, {
          type: 'bar',
          data: {
            labels: timeLabels.length > 0 ? timeLabels : ['No Data'],
            datasets: [{
              label: 'Moods Logged',
              data: engageData.length > 0 ? engageData : [0],
              backgroundColor: barGradient,
              borderRadius: 8,
              borderWidth: 0,
              barThickness: 'flex',
              maxBarThickness: 45
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, grid: { borderDash: [5, 5] } },
              x: { grid: { display: false } }
            }
          }
        });

        // 4. Render Health Line Chart
        const lineCtx = document.getElementById('lineChart').getContext('2d');
        const lineGradient = lineCtx.createLinearGradient(0, 0, 0, 300);
        lineGradient.addColorStop(0, 'rgba(225, 29, 72, 0.2)');
        lineGradient.addColorStop(1, 'rgba(225, 29, 72, 0)');

        new Chart(lineCtx, {
          type: 'line',
          data: {
            labels: timeLabels.length > 0 ? timeLabels : ['No Data'],
            datasets: [{
              label: 'Avg Stress Level',
              data: stressLineData.length > 0 ? stressLineData : [0],
              borderColor: '#e11d48',
              backgroundColor: lineGradient,
              borderWidth: 3,
              fill: true,
              tension: 0.4,
              pointBackgroundColor: '#fff',
              pointBorderColor: '#e11d48',
              pointRadius: 5,
              pointHoverRadius: 7
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, max: 10, grid: { borderDash: [5, 5] } },
              x: { grid: { display: false } }
            }
          }
        });

        // 5. Render Demographic Doughnut Chart
        const doughCtx = document.getElementById('doughnutChart').getContext('2d');
        const stressDist = data.stressDistribution || [];
        const doughLabels = stressDist.map(item => `Level ${item._id}`);
        const doughData = stressDist.map(item => item.count);
        
        const doughColors = stressDist.map(item => {
          if(item._id <= 3) return '#34d399'; // Emerald
          if(item._id <= 7) return '#fbbf24'; // Amber
          return '#e11d48'; // Rose
        });

        new Chart(doughCtx, {
          type: 'doughnut',
          data: {
            labels: doughLabels.length > 0 ? doughLabels : ['No Data'],
            datasets: [{
              data: doughData.length > 0 ? doughData : [1],
              backgroundColor: doughColors.length > 0 ? doughColors : ['#f3f4f6'],
              borderColor: '#ffffff',
              borderWidth: 3,
              hoverOffset: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '75%',
            plugins: {
              legend: { position: 'right' }
            }
          }
        });

      } catch (err) {
        console.error(err);
        document.getElementById('alerts-list').innerHTML = '<p style="color: #e11d48; text-align: center;">Connection failed.</p>';
      }
    });
  </script>
</body>
</html>
