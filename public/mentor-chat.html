<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGO Mentor Chat | MindSpace</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    .chat-container {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 700px;
      overflow: hidden;
      padding: 0;
    }

    .mentor-list {
      border-right: 1px solid rgba(0,0,0,0.05);
      overflow-y: auto;
      padding: 1.5rem;
    }

    .mentor-item {
      padding: 1rem;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.4);
    }

    .mentor-item:hover { background: white; transform: translateX(5px); }
    .mentor-item.active { background: var(--primary); color: white; }

    .message-area {
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.2);
    }

    .chat-window {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .msg-bubble {
      max-width: 70%;
      padding: 1rem 1.2rem;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .user-msg {
      align-self: flex-end;
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .mentor-msg {
      align-self: flex-start;
      background: white;
      color: var(--text-dark);
      border-bottom-left-radius: 4px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .chat-input-wrapper {
      padding: 1.5rem;
      background: white;
      display: flex;
      gap: 12px;
      border-top: 1px solid rgba(0,0,0,0.05);
    }
    
    .chat-input-wrapper input { margin-bottom: 0; }
  </style>
</head>
<body>
  <header>
    <a href="home.html" class="logo">
      <img src="images/logo.png" alt="MindSpace" style="height: 38px; width: 38px; border-radius: 10px; vertical-align: middle;">
      MindSpace
    </a>
    <nav>
      <a href="home.html">Home</a>
      <a href="diary.html">Diary</a>
      <a href="chat.html">Community</a>
      <a href="mentor-chat.html" class="active">Mentors</a>
      <a href="#" id="btn-logout" style="color: #ef4444; font-weight: 700;">Logout</a>
    </nav>
  </header>

  <main class="glass-container chat-container fade-in">
    <div class="mentor-list" id="mentor-list">
      <h3 style="margin-bottom: 1.5rem;">NGO Mentors</h3>
      <!-- Mentors populated here -->
      <div class="text-muted">Loading mentors...</div>
    </div>

    <div class="message-area">
      <div class="chat-window" id="chat-window">
        <div style="text-align: center; margin: auto; padding: 2rem;">
          <div style="font-size: 4rem; margin-bottom: 1.5rem;">👋</div>
          <h3>Consult a Mentor</h3>
          <p class="text-muted">Select a mentor from the left to start a private conversation.</p>
        </div>
      </div>

      <div class="chat-input-wrapper" id="input-area" style="display: none;">
        <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off">
        <button id="send-btn" class="btn btn-primary" style="padding: 0.7rem 1.5rem;">Send ✨</button>
      </div>
    </div>
  </main>

  <script src="js/mentor-chat.js"></script>
  <script>
    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.removeItem('mindspace_user');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
