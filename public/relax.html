<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Relax | MindSpace</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .breathing-circle {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent) 0%, rgba(56, 178, 172, 0.2) 100%);
      margin: 60px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.8rem;
      font-weight: 600;
      box-shadow: 0 0 30px rgba(56, 178, 172, 0.4);
      transition: all 4s ease-in-out;
    }
    .inhale {
      transform: scale(1.6);
      background: radial-gradient(circle, var(--primary) 0%, rgba(107, 70, 193, 0.2) 100%);
      box-shadow: 0 0 50px rgba(107, 70, 193, 0.6);
    }
    .exhale {
      transform: scale(1);
    }
  </style>
</head>
<body>
  <header>
    <a href="home.html" class="logo"><img src="images/logo.png" alt="MindSpace" style="height: 35px; width: 35px; border-radius: 8px; vertical-align: middle;"> MindSpace</a>
    <nav>
      <a href="home.html">Home</a>
      <a href="diary.html">Diary</a>
      <a href="chat.html">Chat</a>
      <a href="relax.html" class="active">Relax</a>
    </nav>
  </header>

  <main class="glass-container fade-in" style="text-align: center;">
    <h2>Breathing Exercise</h2>
    <p class="text-muted" style="margin-bottom: 2rem;">Follow the circle to regulate your breathing and lower your stress.</p>

    <div class="breathing-circle" id="breathe-circle">Ready</div>
    
    <button id="start-breathe" class="btn btn-accent" style="margin-top: 2rem; font-size: 1.1rem; padding: 1rem 2rem;">Start Exercise</button>
  </main>

  <script>
    const circle = document.getElementById('breathe-circle');
    const startBtn = document.getElementById('start-breathe');
    let breathingInterval;

    startBtn.addEventListener('click', () => {
      if (startBtn.innerText === 'Stop') {
        clearInterval(breathingInterval);
        circle.className = 'breathing-circle';
        circle.innerText = 'Ready';
        startBtn.innerText = 'Start Exercise';
        return;
      }

      startBtn.innerText = 'Stop';
      breatheAnimation();
      breathingInterval = setInterval(breatheAnimation, 8000); // 4s inhale, 4s exhale
    });

    function breatheAnimation() {
      circle.innerText = 'Breathe In...';
      circle.className = 'breathing-circle inhale';
      
      setTimeout(() => {
        circle.innerText = 'Breathe Out...';
        circle.className = 'breathing-circle exhale';
      }, 4000);
    }
  </script>
  <script src="js/chatbot.js"></script>
</body>
</html>
